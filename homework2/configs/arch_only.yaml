# configs/arch_only.yaml
# Architecture changes only — training strategy kept identical to baseline.
#
# WHAT CHANGED (defined in configs/yolov8n_arch_modified.yaml):
#   - Neck C2f blocks: shortcut=False → shortcut=True (residual connections)
#   - Added an extra bottom-up P3→P4 fusion stage in the PANet neck
#   - Detection head reads from the new fused P4 feature map
#
# WHY: residual connections in the neck preserve spatial detail as features
# flow between scales. The extra P3→P4 fusion pass gives medium-scale
# detections richer fine-grained context, which is where most COCO
# mAP gains are accessible on a small dataset.
#
# Training strategy is byte-for-byte identical to baseline so any mAP
# delta is attributable solely to the neck architecture change.

# model: ../configs/yolov8n_arch_modified.yaml   # custom architecture definition

epochs: 50
imgsz: 640
batch: 32
workers: 8
device: 0

# Optimizer — identical to baseline
optimizer: SGD
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Augmentation — identical to baseline
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0

# Logging
project: runs
name: arch_only
save: true
plots: true
val: true
